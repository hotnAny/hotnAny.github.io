<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bouldering Analysis</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root { --bg:#0f1117; --card:#191c24; --ink:#e7e9ee; --muted:#9aa1ae; --accent:#5b9dff; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--ink); }
  header { padding:28px 32px 8px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
  h1 { margin:0; font-size:22px; }
  .sub { color:var(--muted); font-size:13px; margin-top:4px; }
  .picker { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--muted); }
  select { background:var(--card); color:var(--ink); border:1px solid rgba(255,255,255,0.12);
           border-radius:8px; padding:8px 12px; font-size:14px; }
  .kpis { display:flex; flex-wrap:wrap; gap:14px; padding:16px 32px; }
  .kpi { background:var(--card); border-radius:12px; padding:14px 18px; min-width:130px; }
  .kpi .v { font-size:26px; font-weight:700; }
  .kpi .l { color:var(--muted); font-size:12px; margin-top:2px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(380px,1fr)); gap:18px; padding:16px 32px 40px; }
  .card { background:var(--card); border-radius:14px; padding:16px 18px; }
  .card h3 { margin:0 0 4px; font-size:15px; }
  .card .note { color:var(--muted); font-size:12px; margin:0 0 10px; }
  canvas { max-height:300px; }
  footer { color:var(--muted); font-size:12px; padding:0 32px 32px; }
</style>
</head>
<body>
<header>
  <div>
    <h1>🧗 Bouldering Analysis</h1>
    <div class="sub" id="range"></div>
  </div>
  <label class="picker">Window <select id="window"></select></label>
</header>
<div class="kpis" id="kpis"></div>
<div class="grid" id="grid"></div>
<footer>Charts are interactive — hover for values, click legend entries to toggle series. Switch the window at the top to recompute everything.</footer>

Chart.defaults.color = "#9aa1ae";
Chart.defaults.borderColor = "rgba(255,255,255,0.06)";
const PALETTE = ["#5b9dff","#57d9a3","#f2c94c","#eb5757","#bb6bd9","#f2994a","#56ccf2","#a0aec0"];

let charts = [];
const grid = document.getElementById("grid");

function card(title, note) {
  const el = document.createElement("div");
  el.className = "card";
  el.innerHTML = `<h3>${title}</h3><p class="note">${note}</p><canvas></canvas>`;
  grid.appendChild(el);
  return el.querySelector("canvas");
}
function chart(cfg) { charts.push(new Chart(card(cfg._t, cfg._n), cfg)); }

function render(data) {
  charts.forEach(c => c.destroy());
  charts = [];
  grid.innerHTML = "";

  const k = data.kpis;
  document.getElementById("range").textContent = "Window: " + k.range;
  const kpiDefs = [
    [k.sessions, "sessions"],
    [k.problems_logged, "problems logged"],
    [k.overall_send_rate + "%", "overall send rate"],
    [k.total_sends, "total sends"],
    [k.highest_send, "highest send"],
    [k.avg_session_min + " min", "avg session length"],
  ];
  document.getElementById("kpis").innerHTML = kpiDefs.map(
    ([v, l]) => `<div class="kpi"><div class="v">${v}</div><div class="l">${l}</div></div>`
  ).join("");

  const t = data.trends;
  const line = (title, note, series, color) => chart({
    _t: title, _n: note, type: "line",
    data: { labels: t.months, datasets: [{ data: series, borderColor: color,
      backgroundColor: "transparent", tension: 0.3, spanGaps: true, pointRadius: 3 }] },
    options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
  });

  line("Sessions per month", "Training frequency", t.sessions_per_month, PALETTE[0]);
  line("Send rate", "% of logged problems sent", t.send_rate, PALETTE[1]);
  line("V5+ sends per session", "Hard-problem output", t.target_sends_per_session, PALETTE[2]);
  line("Attempts per V5+ send", "Projecting efficiency (lower = better)", t.attempts_per_target_send, PALETTE[3]);
  line("Session length", "Minutes per session", t.minutes_per_session, PALETTE[4]);
  line("Send quality", "Self-rated quality of sends", t.send_quality, PALETTE[5]);

  chart({ _t: "Grade pyramid", _n: "Attempts vs. sends by grade", type: "bar",
    data: { labels: data.pyramid.grades, datasets: [
      { label: "Attempts", data: data.pyramid.attempts, backgroundColor: PALETTE[7] },
      { label: "Sends", data: data.pyramid.sends, backgroundColor: PALETTE[1] } ] },
    options: { scales: { y: { beginAtZero: true } } } });

  chart({ _t: "Flash rate by grade", _n: "% sent on the first attempt", type: "bar",
    data: { labels: data.pyramid.grades, datasets: [{ data: data.pyramid.flash_rate, backgroundColor: PALETTE[0] }] },
    options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, max: 100 } } } });

  data.technique.forEach(tech => chart({
    _t: "Send rate when: " + tech.name + "?",
    _n: "Does self-reported " + tech.name.toLowerCase() + " track with sending?",
    type: "bar",
    data: { labels: ["Yes", "Maybe", "No"], datasets: [{ data: tech.send_rate,
      backgroundColor: [PALETTE[1], PALETTE[2], PALETTE[3]] }] },
    options: { plugins: { legend: { display: false },
      tooltip: { callbacks: { afterLabel: (c) => "n = " + tech.counts[c.dataIndex] } } },
      scales: { y: { beginAtZero: true, title: { display: true, text: "send rate %" } } } }
  }));

  chart({ _t: "Send rate by problem type", _n: "Hover for volume", type: "bar",
    data: { labels: data.problem.types, datasets: [{ data: data.problem.rate,
      backgroundColor: PALETTE.slice(0, data.problem.types.length) }] },
    options: { plugins: { legend: { display: false },
      tooltip: { callbacks: { afterLabel: (c) => "n = " + data.problem.n[c.dataIndex] } } },
      scales: { y: { beginAtZero: true } } } });

  chart({ _t: "Hold types", _n: "How often each hold type appears", type: "bar",
    data: { labels: data.holds.types, datasets: [{ data: data.holds.n, backgroundColor: PALETTE[5] }] },
    options: { indexAxis: "y", plugins: { legend: { display: false } } } });

  chart({ _t: "Send rate by hold type", _n: "Where the weaknesses are", type: "bar",
    data: { labels: data.holds.types, datasets: [{ data: data.holds.rate, backgroundColor: PALETTE[0] }] },
    options: { indexAxis: "y", plugins: { legend: { display: false } }, scales: { x: { beginAtZero: true } } } });

  chart({ _t: "Fall causes", _n: "Most common reasons a problem wasn't sent", type: "bar",
    data: { labels: data.issues.labels, datasets: [{ data: data.issues.counts, backgroundColor: PALETTE[3] }] },
    options: { indexAxis: "y", plugins: { legend: { display: false } } } });
}

const sel = document.getElementById("window");
DOC.order.forEach(label => {
  const o = document.createElement("option");
  o.value = label; o.textContent = label;
  if (label === DOC.default) o.selected = true;
  sel.appendChild(o);
});
sel.addEventListener("change", () => render(DOC.windows[sel.value]));
render(DOC.windows[DOC.default]);
</script>
</body>
